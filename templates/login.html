<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Car Showroom Management System | Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>
    <div class="login-page">
        <form method="POST" action="{{ url_for('login_to_db') }}">
            <div class="login-box">
                <i class="fas fa-car-side login-icon"></i>
                <h2>Welcome Back</h2>
                <p>Sign in to access the Car Showroom Management System</p>
                <div class="input-box">
                    <i class="fas fa-user"></i>
                    <input
                        type="text"
                        name="username"
                        id="username"
                        placeholder="Username"
                        required>
                </div>

                <div class="input-box">
                    <i class="fas fa-lock"></i>
                    <input
                        type="password"
                        name="password"
                        id="password"
                        placeholder="Password"
                        required>
                </div>
                {% if error %}
                <div class="error">
                    {{ error }}
                </div>
                {% endif %}

                <button type="submit">
                    <i class="fas fa-right-to-bracket"></i>
                    Login
                </button>
            </div>
        </form>
    </div>
</body>
</html>
