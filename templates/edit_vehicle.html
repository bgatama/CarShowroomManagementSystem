<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Vehicle</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="content">

    <div class="vehicle-card">

        <div class="card-header">
            <h2>Edit Vehicle</h2>
        </div>

        <form action="{{ url_for('update_vehicle', vehicle_id=vehicle[0]) }}" method="POST">

            <div class="vehicle-form">

                <div class="form-group">
                    <label>Make</label>
                    <input type="text" name="make" value="{{ vehicle[1] }}" required>
                </div>

                <div class="form-group">
                    <label>Model</label>
                    <input type="text" name="model" value="{{ vehicle[2] }}" required>
                </div>

                <div class="form-group">
                    <label>Year</label>
                    <input type="number" name="year" value="{{ vehicle[3] }}" required>
                </div>

                <div class="form-group">
                    <label>VIN Number</label>
                    <input type="text" name="vehicle_vin_number" value="{{ vehicle[4] }}" required>
                </div>

                <div class="form-group">
                    <label>Price</label>
                    <input type="number" name="price" value="{{ vehicle[5] }}" required>
                </div>

                <div class="form-group">
                    <label>Status</label>
                    <input type="text" name="vehicle_status" value="{{ vehicle[6] }}" required>
                </div>

                <div class="form-group">
                    <label>Purchase Date</label>
                    <input type="date" name="purchase_date" value="{{ vehicle[7] }}">
                </div>

            </div>

            <div class="button-area">
                <button type="submit">Update Vehicle</button>
                <a href="{{ url_for('vehicles') }}" class="delete-btn">Cancel</a>
            </div>

        </form>

    </div>

</div>

</body>
</html>
