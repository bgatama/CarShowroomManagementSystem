<!DOCTYPE html>
<html>
<head>
    <title>Edit Customer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="content">

<div class="customer-card">

<h2>Edit Customer</h2>

<form action="{{ url_for('update_customer', customer_id=customer[0]) }}" method="POST">

<div class="customer-form">

<div class="form-group">
<label>National ID</label>
<input type="text" name="national_id" value="{{ customer[1] }}">
</div>

<div class="form-group">
<label>First Name</label>
<input type="text" name="first_name" value="{{ customer[2] }}">
</div>

<div class="form-group">
<label>Last Name</label>
<input type="text" name="last_name" value="{{ customer[3] }}">
</div>

<div class="form-group">
<label>Phone Number</label>
<input type="text" name="phone" value="{{ customer[4] }}">
</div>

<div class="form-group">
<label>Email</label>
<input type="email" name="email" value="{{ customer[5] }}">
</div>

<div class="form-group">
<label>Gender</label>
<input type="text" name="gender" value="{{ customer[6] }}">
</div>

<div class="form-group">
<label>Customer Type</label>
<input type="text" name="customer_type" value="{{ customer[7] }}">
</div>

</div>

<div class="button-area">
<button type="submit">Update Customer</button>
<a href="{{ url_for('customers') }}" class="delete-btn">Cancel</a>
</div>

</form>

</div>

</div>

</body>
</html>
